name: Release (.tar.gz)

on:
  push:
    branches:
      - main
    paths:
      - 'style.css'
      - 'script.js'
      - 'index.html'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout (mit Tags!)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Git Setup
      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # 3️⃣ Tags holen
      - name: Fetch tags
        run: git fetch --tags

      # 4️⃣ Version bestimmen (Patch +1 Standard)
      - name: Calculate next version
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=${LAST_TAG#v}

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Default: PATCH +1
          PATCH=$((PATCH + 1))

          # Optional: Commit overrides
          MSG="$(git log -1 --pretty=%B)"

          if echo "$MSG" | grep -qi "\[major\]"; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
          elif echo "$MSG" | grep -qi "\[minor\]"; then
            MINOR=$((MINOR + 1))
            PATCH=0
          fi

          NEXT_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEXT_VERSION=$NEXT_VERSION" >> $GITHUB_ENV

      # 5️⃣ Release Ordner vorbereiten
      - name: Prepare release folder
        run: |
          rm -rf release
          mkdir release

          cp -r assets release/assets
          cp style.css release/
          cp script.js release/
          cp index.html release/
          cp README.md release/
          cp LICENSE release/

      # 6️⃣ .tar.gz erstellen
      - name: Create archive
        run: |
          tar -czf play_a_game-${{ env.NEXT_VERSION }}.tar.gz -C release .

      # 7️⃣ Tag erstellen & pushen
      - name: Create and push tag
        run: |
          git tag v${{ env.NEXT_VERSION }}
          git push origin v${{ env.NEXT_VERSION }}

      # 8️⃣ GitHub Release erstellen
      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.NEXT_VERSION }}
          name: Release v${{ env.NEXT_VERSION }}
          artifacts: play_a_game-${{ env.NEXT_VERSION }}.tar.gz
          generateReleaseNotes: true
          draft: false
          prerelease: false