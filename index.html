<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Arcade</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font/css/materialdesignicons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen" onclick="startArcade()">
    <h1 class="title">ARCADE</h1>
    <p class="press-start">▶ PRESS START ◀</p>
  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" class="hidden">
    <header>
      <h1>🕹️ Arcade Games<a href="https://github.com/PixelPulps" target="_blank" class="github-link">
      <span class="mdi mdi-github"></span>
      </a></h1>
    </header>

  <main>
    <div class="game-container">

      <a href="https://pixelpulps.github.io/moorhuhn/" class="game-card">
      
      <!-- Bild -->
      <img src="assets/Game-Bilder/moorhuhn-favicon.png" alt="Moorhuhn Preview" class="game-image">

      <!-- Titel -->
      <p>Moorhuhn</p>

      <!-- Issue Icon -->
      <a href="https://github.com/PixelPulps/moorhuhn/issues" target="_blank" class="issue-link">
        <span class="mdi mdi-bug"></span>
      </a>

    </div>

    <!-- <a href="#" class="game-card">
      <p>Bierpong</p>
    </a> -->

  </main>
  </div>

  <div class="overlay-grid"></div>
  <script src="script.js"></script>
</body>
</html>
